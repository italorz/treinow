name: treinow
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose: ["80"]
    depends_on:
      api: { condition: service_healthy }
    read_only: true
    tmpfs: ["/var/cache/nginx", "/var/run"]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 3000"]
    env_file: .env
    environment:
      PORT: "3000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:3000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    read_only: true
    tmpfs: ["/tmp"]

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["arq", "app.worker.WorkerSettings"]
    env_file: .env
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped
    read_only: true
    tmpfs: ["/tmp"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-treinow}
      POSTGRES_USER: ${POSTGRES_USER:-treinow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-treinow} -d ${POSTGRES_DB:-treinow}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD:-change-me}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  minio-data:
